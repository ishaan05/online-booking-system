<header class="oa-cmdbar" role="banner">
  <div class="oa-cmdbar__shell">
    <div class="oa-cmdbar__left">
      <div class="oa-cmdbar__portal-mark" aria-hidden="true" title="Book Here Admin">
        <span class="oa-cmdbar__portal-orbit"></span>
        <span class="oa-cmdbar__portal-orbit oa-cmdbar__portal-orbit--delayed"></span>
        <svg class="oa-cmdbar__portal-mark-svg" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <defs>
            <linearGradient id="oaCmdLogoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#e0e7ff" />
              <stop offset="50%" stop-color="#a5b4fc" />
              <stop offset="100%" stop-color="#38bdf8" />
            </linearGradient>
          </defs>
          <rect x="4" y="5" width="16" height="15" rx="2.5" stroke="url(#oaCmdLogoGrad)" stroke-width="1.5" fill="rgba(255,255,255,0.08)" />
          <path d="M8 3v3M16 3v3M4 11h16" stroke="url(#oaCmdLogoGrad)" stroke-width="1.5" stroke-linecap="round" />
          <circle cx="12" cy="15.5" r="2" fill="url(#oaCmdLogoGrad)" class="oa-cmdbar__portal-core" />
        </svg>
      </div>
      <div class="oa-cmdbar__titles">
        <p class="oa-cmdbar__kicker oa-cmdbar__kicker--portal">{{ portalHeaderName }}</p>
        <h1 class="oa-cmdbar__title">{{ pageTitle }}</h1>
      </div>
    </div>

    <div class="oa-cmdbar__center">
      <div class="oa-cmdbar__search-wrap" #searchWrap>
        <svg class="oa-cmdbar__search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
        </svg>
        <input
          type="search"
          class="oa-cmdbar__search-input"
          [(ngModel)]="searchQuery"
          (ngModelChange)="onSearchInput()"
          (focus)="onSearchFocus()"
          placeholder="Search bookings, halls, staff…"
          aria-label="Search bookings halls and staff"
          autocomplete="off"
        />
        <button type="button" class="oa-cmdbar__filter" (click)="filterClick($event)" aria-label="Show search results if any">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 4h18M6 12h12M10 20h4" />
          </svg>
        </button>
        <div class="oa-cmdbar__search-panel" *ngIf="searchOpen && searchHits.length" role="listbox" aria-label="Search results">
          <button
            type="button"
            class="oa-cmdbar__search-hit"
            *ngFor="let hit of searchHits"
            (mousedown)="$event.preventDefault(); openHit(hit)"
            role="option"
          >
            <span class="oa-cmdbar__search-kind">{{ hit.kind === 'booking' ? 'Booking' : hit.kind === 'hall' ? 'Hall' : 'Staff' }}</span>
            <span class="oa-cmdbar__search-title">{{ hit.title }}</span>
            <span class="oa-cmdbar__search-sub">{{ hit.sub }}</span>
          </button>
        </div>
        <div class="oa-cmdbar__search-empty" *ngIf="searchOpen && searchQuery.trim().length >= 2 && !searchHits.length">
          No matches. Try another keyword.
        </div>
      </div>
    </div>

    <div class="oa-cmdbar__actions">
      <button
        type="button"
        class="oa-cmdbar__booking"
        (click)="openOnlineBooking()"
        title="Opens the public hall booking site (User Portal)"
        aria-label="User Portal — open public booking site"
      >
        <svg class="oa-cmdbar__btn-icon oa-cmdbar__btn-icon--external" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" stroke-linecap="round" stroke-linejoin="round" />
          <polyline points="15 3 21 3 21 9" stroke-linecap="round" stroke-linejoin="round" />
          <line x1="10" y1="14" x2="21" y2="3" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        <span>User Portal</span>
      </button>
      <button *ngIf="auth.isSuperAdmin()" type="button" class="oa-cmdbar__quick" (click)="quickCreate()">
        <span aria-hidden="true">+</span> Quick create
      </button>

      <button
        type="button"
        class="oa-cmdbar__theme"
        (click)="theme.toggle()"
        [attr.aria-label]="isDarkTheme ? 'Switch to light mode' : 'Switch to dark mode'"
        [attr.aria-pressed]="isDarkTheme"
      >
        <span class="oa-cmdbar__theme-cube" [class.oa-cmdbar__theme-cube--dark]="isDarkTheme">
          <span class="oa-cmdbar__theme-face oa-cmdbar__theme-face--sun">
            <svg class="oa-cmdbar__theme-graphic" viewBox="0 0 32 32" aria-hidden="true">
              <defs>
                <linearGradient id="oaAdmSun" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#fef9c3" />
                  <stop offset="40%" stop-color="#fbbf24" />
                  <stop offset="100%" stop-color="#ea580c" />
                </linearGradient>
                <linearGradient id="oaAdmRay" x1="0%" y1="0%" x2="0%" y2="100%">
                  <stop offset="0%" stop-color="#fffbeb" stop-opacity="0.95" />
                  <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.5" />
                </linearGradient>
              </defs>
              <g class="oa-cmdbar__theme-sunrays" fill="url(#oaAdmRay)">
                <rect x="15" y="3" width="2" height="5" rx="1" />
                <g transform="rotate(45 16 16)"><rect x="15" y="3" width="2" height="5" rx="1" /></g>
                <g transform="rotate(90 16 16)"><rect x="15" y="3" width="2" height="5" rx="1" /></g>
                <g transform="rotate(135 16 16)"><rect x="15" y="3" width="2" height="5" rx="1" /></g>
              </g>
              <circle cx="16" cy="16" r="6.25" fill="url(#oaAdmSun)" />
            </svg>
          </span>
          <span class="oa-cmdbar__theme-face oa-cmdbar__theme-face--moon">
            <svg class="oa-cmdbar__theme-graphic" viewBox="0 0 32 32" aria-hidden="true">
              <defs>
                <linearGradient id="oaAdmMoon" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#f1f5f9" />
                  <stop offset="55%" stop-color="#a5b4fc" />
                  <stop offset="100%" stop-color="#6366f1" />
                </linearGradient>
              </defs>
              <circle cx="8.5" cy="9" r="0.9" fill="#c7d2fe" opacity="0.85" />
              <circle cx="24" cy="11" r="0.55" fill="#e0e7ff" opacity="0.65" />
              <circle cx="21" cy="22" r="0.45" fill="#a5b4fc" opacity="0.5" />
              <mask id="oaAdmMoonCut">
                <rect width="32" height="32" fill="white" />
                <circle cx="21.5" cy="14" r="6.2" fill="black" />
              </mask>
              <circle cx="14" cy="16" r="7.4" fill="url(#oaAdmMoon)" mask="url(#oaAdmMoonCut)" />
            </svg>
          </span>
        </span>
      </button>
    </div>
  </div>
</header>
