<div class="oa-sign">
  <div class="oa-sign__aurora" aria-hidden="true"></div>
  <div class="oa-sign__grid" aria-hidden="true"></div>
  <div class="oa-sign__orb" aria-hidden="true"></div>

  <div class="oa-sign__panel">
    <div class="oa-sign__toolbar">
      <button
        type="button"
        class="oa-sign__theme"
        appRipple
        (click)="theme.toggle()"
        [attr.aria-label]="isDarkTheme ? 'Switch to light mode' : 'Switch to dark mode'"
        [attr.aria-pressed]="isDarkTheme"
      >
        <span class="oa-sign__theme-cube" [class.oa-sign__theme-cube--dark]="isDarkTheme">
          <span class="oa-sign__theme-face">
            <svg class="oa-sign__theme-graphic" viewBox="0 0 32 32" aria-hidden="true">
              <defs>
                <linearGradient id="oaFpSun" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#fef9c3" />
                  <stop offset="40%" stop-color="#fbbf24" />
                  <stop offset="100%" stop-color="#ea580c" />
                </linearGradient>
                <linearGradient id="oaFpRay" x1="0%" y1="0%" x2="0%" y2="100%">
                  <stop offset="0%" stop-color="#fffbeb" stop-opacity="0.95" />
                  <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.5" />
                </linearGradient>
              </defs>
              <g class="oa-sign__theme-sunrays" fill="url(#oaFpRay)">
                <rect x="15" y="3" width="2" height="5" rx="1" />
                <g transform="rotate(45 16 16)"><rect x="15" y="3" width="2" height="5" rx="1" /></g>
                <g transform="rotate(90 16 16)"><rect x="15" y="3" width="2" height="5" rx="1" /></g>
                <g transform="rotate(135 16 16)"><rect x="15" y="3" width="2" height="5" rx="1" /></g>
              </g>
              <circle cx="16" cy="16" r="6.25" fill="url(#oaFpSun)" />
            </svg>
          </span>
          <span class="oa-sign__theme-face oa-sign__theme-face--moon">
            <svg class="oa-sign__theme-graphic" viewBox="0 0 32 32" aria-hidden="true">
              <defs>
                <linearGradient id="oaFpMoon" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#f1f5f9" />
                  <stop offset="55%" stop-color="#a5b4fc" />
                  <stop offset="100%" stop-color="#6366f1" />
                </linearGradient>
              </defs>
              <circle cx="8.5" cy="9" r="0.9" fill="#c7d2fe" opacity="0.85" />
              <circle cx="24" cy="11" r="0.55" fill="#e0e7ff" opacity="0.65" />
              <circle cx="21" cy="22" r="0.45" fill="#a5b4fc" opacity="0.5" />
              <mask id="oaFpMoonCut">
                <rect width="32" height="32" fill="white" />
                <circle cx="21.5" cy="14" r="6.2" fill="black" />
              </mask>
              <circle cx="14" cy="16" r="7.4" fill="url(#oaFpMoon)" mask="url(#oaFpMoonCut)" />
            </svg>
          </span>
        </span>
      </button>
    </div>

    <div
      class="oa-sign__card"
      appFadeInView
      [appFadeInViewDelay]="40"
      [class.lu-action--success]="formSucceeded"
    >
      <div *ngIf="submitting" class="lu-glass-block" aria-live="polite" aria-busy="true">
        <span class="lu-dots" aria-hidden="true"><span></span><span></span><span></span></span>
      </div>
      <div class="oa-sign__mark" aria-hidden="true">↻</div>
      <p class="oa-sign__kicker">Account recovery</p>
      <h1 id="forgot-heading" class="oa-sign__title">Reset access</h1>
      <p class="oa-sign__lead">
        Use your office username, registered mobile, or email on file, then set a new password that satisfies policy.
      </p>

      <form (ngSubmit)="submit()" novalidate>
        <div class="oa-sign__field">
          <label class="oa-sign__label" for="forgot-id">Username, mobile, or email</label>
          <input
            id="forgot-id"
            name="officeIdentifier"
            type="text"
            class="oa-sign__input"
            [(ngModel)]="officeIdentifier"
            autocomplete="username"
            [disabled]="submitting"
          />
        </div>
        <div class="oa-sign__field">
          <label class="oa-sign__label" for="forgot-newpw">New password</label>
          <input
            id="forgot-newpw"
            name="newPassword"
            type="password"
            class="oa-sign__input"
            [(ngModel)]="newPassword"
            autocomplete="new-password"
            maxlength="16"
            [disabled]="submitting"
          />
          <p class="oa-sign__hint">{{ policyHint }}</p>
        </div>
        <div class="oa-sign__actions">
          <button
            type="submit"
            class="oa-sign__btn lu-action"
            appRipple
            [class.lu-action--loading]="submitting"
            [disabled]="submitting"
            [attr.aria-busy]="submitting"
          >
            <span *ngIf="!submitting">Update password</span>
            <span *ngIf="submitting" class="oa-sign__btn__spinner" aria-hidden="true"></span>
          </button>
        </div>
      </form>

      <p *ngIf="errorMessage" class="oa-sign__alert oa-sign__alert--error" role="alert">{{ errorMessage }}</p>
      <p *ngIf="successMessage" class="oa-sign__alert oa-sign__alert--success" role="status">{{ successMessage }}</p>

      <div class="oa-sign__footer">
        <a routerLink="/admin/login" class="oa-sign__link">Back to sign in</a>
      </div>
    </div>
  </div>
</div>
