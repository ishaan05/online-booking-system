<div class="admin-page admin-page--wide admin-page--premium-form change-pw">
  <div class="admin-card admin-form-page-card">
    <div class="admin-card__header admin-form-page-card__head">
      <div class="admin-form-page-card__head-inner">
        <h1 class="admin-form-page-card__title">Change password</h1>
        <p class="admin-form-page-card__subtitle">Find the admin by email or mobile, then set a new password.</p>
      </div>
    </div>
    <div class="admin-card__body admin-form-page-card__body">
      <section class="admin-form-page-panel admin-form-page-panel--wide" aria-labelledby="cp-sec">
        <h2 class="admin-form-page-panel__title" id="cp-sec">Credentials</h2>
        <div class="admin-form-page-panel__stack">
          <div class="admin-form__row">
            <label class="admin-form__label" for="cp-id">Email ID or mobile number</label>
            <input
              id="cp-id"
              class="admin-form__input admin-form-page__control"
              [(ngModel)]="identifier"
              placeholder="Enter email ID or mobile number"
            />
          </div>
          <div class="admin-form__row">
            <label class="admin-form__label" for="cp-cur">Current password</label>
            <input
              id="cp-cur"
              class="admin-form__input admin-form-page__control"
              type="password"
              [(ngModel)]="currentPassword"
              placeholder="Enter current password"
            />
          </div>
          <div class="admin-form__row">
            <label class="admin-form__label" for="cp-new">New password</label>
            <input
              id="cp-new"
              class="admin-form__input admin-form-page__control"
              type="password"
              [(ngModel)]="newPassword"
              placeholder="8 to 16 characters"
            />
          </div>
          <div class="admin-form__row">
            <label class="admin-form__label" for="cp-conf">Confirm new password</label>
            <input
              id="cp-conf"
              class="admin-form__input admin-form-page__control"
              type="password"
              [(ngModel)]="confirmPassword"
              placeholder="Re-enter new password"
            />
          </div>
          <p *ngIf="message" class="change-pw__msg" role="status">{{ message }}</p>
        </div>
      </section>
      <div class="admin-form__actions admin-form-page-card__actions change-pw__actions">
        <button type="button" class="admin-btn admin-btn--primary" (click)="submit()">
          <svg class="admin-btn__icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
          </svg>
          Change password
        </button>
      </div>
    </div>
  </div>
</div>
