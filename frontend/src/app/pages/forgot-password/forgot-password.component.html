<div
  *ngIf="open"
  class="forgot-modal"
  role="presentation"
  aria-hidden="false"
>
  <div class="forgot-modal__backdrop" (click)="close()" aria-hidden="true"></div>
  <div
    class="forgot-modal__dialog"
    role="dialog"
    aria-modal="true"
    aria-labelledby="forgot-modal-title"
  >
    <div class="forgot-modal__head">
      <div class="forgot-modal__head-text">
        <p class="forgot-modal__eyebrow">Book Here</p>
        <h2 id="forgot-modal-title" class="forgot-modal__title">Reset password</h2>
      </div>
      <button type="button" class="forgot-modal__close" (click)="close()" aria-label="Close dialog">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M6 6l12 12M18 6L6 18" stroke-linecap="round" />
        </svg>
      </button>
    </div>
    <div class="forgot-modal__body">
      <p class="forgot-modal__lede">
        Enter the email or mobile number on your account, then choose a new password.
      </p>

      <div class="forgot-modal__group">
        <label class="forgot-modal__label" for="forgot-id">Email or mobile</label>
        <input
          id="forgot-id"
          type="text"
          class="forgot-modal__input"
          [(ngModel)]="emailOrMobile"
          autocomplete="username"
          [disabled]="submitting"
        />
      </div>

      <div class="forgot-modal__group">
        <label class="forgot-modal__label" for="forgot-newpw">New password</label>
        <input
          id="forgot-newpw"
          type="password"
          class="forgot-modal__input"
          [(ngModel)]="newPassword"
          autocomplete="new-password"
          [disabled]="submitting"
        />
        <p class="forgot-modal__hint">{{ policyHint }}</p>
      </div>

      <p *ngIf="errorMessage" class="forgot-modal__msg forgot-modal__msg--error" role="alert">
        {{ errorMessage }}
      </p>
      <p *ngIf="successMessage" class="forgot-modal__msg forgot-modal__msg--ok" role="status">
        {{ successMessage }}
      </p>

      <button type="button" class="forgot-modal__cta" (click)="submit()" [disabled]="submitting">
        {{ submitting ? 'Updating…' : 'Update password' }}
      </button>
    </div>
  </div>
</div>
