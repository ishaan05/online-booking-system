<section #root class="user-details-page" aria-labelledby="ud-title">
  <div class="user-details-page__inner">
    <h1 id="ud-title" class="user-details-page__title">User details</h1>

    <div class="user-details-page__card">
      <div class="user-details-page__avatar-block">
        <div class="user-details-page__avatar-wrap">
          <div class="user-details-page__avatar">
            <img *ngIf="photoUrl" [src]="photoUrl" alt="Profile" />
            <span *ngIf="!photoUrl">{{ initials }}</span>
          </div>
          <button
            type="button"
            class="user-details-page__cam"
            (click)="togglePhotoMenu($event)"
            aria-label="Change profile photo"
            aria-haspopup="menu"
            [attr.aria-expanded]="photoMenuOpen"
          >
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"
              />
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
          </button>
        </div>

        <div *ngIf="photoMenuOpen" class="user-details-page__photo-menu" role="menu">
          <button type="button" role="menuitem" class="user-details-page__photo-item" (click)="openFilePicker()">
            Upload from device
          </button>
          <button type="button" role="menuitem" class="user-details-page__photo-item" (click)="openCamera()">
            Take photo
          </button>
        </div>
      </div>

      <input
        #fileInput
        type="file"
        class="user-details-page__file"
        accept="image/jpeg,image/png,.jpg,.jpeg,.png"
        (change)="onFileSelected($event)"
        aria-hidden="true"
        tabindex="-1"
      />

      <p *ngIf="fileError" class="user-details-page__msg user-details-page__msg--error" role="alert">{{ fileError }}</p>

      <label class="ud-field">
        <span class="ud-field__label">Full name</span>
        <input class="ud-field__control" type="text" name="fullName" [(ngModel)]="fullName" autocomplete="name" />
      </label>

      <label class="ud-field">
        <span class="ud-field__label">Mobile number</span>
        <input
          class="ud-field__control"
          type="tel"
          name="mobile"
          [(ngModel)]="mobile"
          inputmode="tel"
          autocomplete="tel"
        />
      </label>

      <label class="ud-field">
        <span class="ud-field__label">Email Id</span>
        <input class="ud-field__control" type="email" name="email" [(ngModel)]="email" autocomplete="email" />
      </label>

      <button type="button" class="user-details-page__save" (click)="saveProfile()">Save changes</button>
    </div>
  </div>

  <div *ngIf="cameraOpen" class="user-details-page__cam-modal" role="dialog" aria-modal="true" aria-label="Camera">
    <div class="user-details-page__cam-backdrop" (click)="closeCamera()"></div>
    <div class="user-details-page__cam-dialog">
      <div class="user-details-page__cam-head">
        <span>Take photo</span>
        <button type="button" class="user-details-page__cam-x" (click)="closeCamera()" aria-label="Close">×</button>
      </div>
      <div class="user-details-page__cam-body">
        <video #videoRef class="user-details-page__video" playsinline muted></video>
        <canvas #canvasRef class="user-details-page__canvas" aria-hidden="true"></canvas>
      </div>
      <div class="user-details-page__cam-actions">
        <button type="button" class="user-details-page__cam-capture" (click)="capturePhoto()">Capture</button>
      </div>
    </div>
  </div>
</section>
