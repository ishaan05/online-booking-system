            </li>

  <button

    type="button"
    class="site-footer__to-top"
    (click)="scrollToTop()"
    aria-label="Back to top"
  >

      <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 15.75l7.5-7.5 7.5 7.5" />
    </svg>

  <div class="site-footer__legal container text-center py-3 small text-muted">
